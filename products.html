<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMR晶圆主要磁性性能 - 元臻微电</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./nav.css">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #050d15; /* 统一主品牌深渊黑背景 */
            overflow-x: hidden;
            color: #ffffff;
        }

        .gradient-text {
            background: #41a5ff; /* 统一品牌科技蓝 */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .wafer-glow {
            position: fixed; /* 改为fixed，滚动时背景发光不变 */
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(65, 165, 255, 0.15) 0%, transparent 70%);
            top: 20%;
            left: 30%; /* 🌟 移到左边填补空白 */
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 0;
        }

        .wafer-image {
            position: fixed; /* 改为fixed */
            top: 25%;
            left: 30%; /* 🌟 移到左边填补空白 */
            transform: translateX(-50%) rotate(-15deg);
            width: 500px;
            height: 500px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
            filter: blur(1px) brightness(0.8);
        }

        .param-label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .param-value {
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        .param-unit {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        .back-btn {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(65, 165, 255, 0.15); /* 统一悬浮蓝 */
            border-color: rgba(65, 165, 255, 0.5);
            color: #ffffff;
        }

        /* 🌟 核心布局改造：右侧 62% 吸附 */
        .content-layout {
            position: relative;
            z-index: 10;
            width: 62%;
            margin-top: 180px;
            margin-left: auto;
            margin-right: 0;
            padding-bottom: 80px;
        }

        /* 移动端/小屏幕防崩兜底 */
        @media (max-width: 1024px) {
            .content-layout {
                width: 90%;
                margin-right: auto;
                padding-right: 0;
                margin-top: 120px;
            }
            .wafer-glow, .wafer-image { opacity: 0.2; left: 50%; }
            .back-btn-container { display: none; }
        }

        /* 入场动画类 */
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        .stagger-6 { animation-delay: 0.6s; }
        .stagger-7 { animation-delay: 0.7s; }
    </style>
</head>

<body class="min-h-screen text-white relative">

    <div class="wafer-glow"></div>
    <div class="wafer-image">
        <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#waferGradient)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
            <ellipse cx="200" cy="200" rx="170" ry="170" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" />
            <ellipse cx="200" cy="200" rx="160" ry="160" stroke="rgba(255,255,255,0.03)" stroke-width="1" fill="none" />
            <defs>
                <radialGradient id="waferGradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="rgba(65, 165, 255, 0.15)" />
                    <stop offset="100%" stop-color="rgba(5, 13, 21, 0)" />
                </radialGradient>
            </defs>
        </svg>
    </div>

    <div class="back-btn-container fixed left-12 top-1/2 -translate-y-1/2 z-50 animate-fade-in stagger-1">
        <button onclick="history.back()" class="back-btn px-6 py-3 rounded-full text-sm text-gray-400 flex items-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>返回上一层</span>
        </button>
    </div>

    <main class="content-layout">

        <div class="space-y">

            <div class="glass-card p-10 text-left animate-fade-in stagger-2 hover:bg-white/5 transition-colors">
                <div class="text-4xl md:text-5xl font-bold mb-2 text-white leading-tight">TMR晶圆</div>
                <div class="text-4xl md:text-5xl font-bold gradient-text">主要磁性性能</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2">
                <div class="glass-card p-8 animate-fade-in stagger-3 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ MR (TYP) ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">230</span>
                        <span class="text-xl param-unit">%</span>
                    </div>
                    <div class="mt-2 text-xs text-gray-500 text-center">性能可调</div>
                </div>

                <div class="glass-card p-8 text-center animate-fade-in stagger-4 hover:bg-white/5 transition-colors">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 ">
                <div class="glass-card p-8 animate-fade-in stagger-3 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ RA (存储类) (TYP) ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">1.5</span>
                        <span class="text-xl param-unit">[Ω·sq]</span>
                    </div>
                    <div class="mt-2 text-xs text-gray-500 text-center">性能可调</div>
                </div>

                <div class="glass-card p-8 animate-fade-in stagger-4 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ RA (传感类) (TYP) ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">15K</span>
                        <span class="text-xl param-unit">[Ω·sq]</span>
                    </div>
                    <div class="mt-2 text-xs text-gray-500 text-center">性能可调</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 ">
                <div class="glass-card p-8 animate-fade-in stagger-5 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ Hc ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">0.14</span>
                        <span class="text-xl param-unit">[Oe]</span>
                    </div>
                </div>

                <div class="glass-card p-8 animate-fade-in stagger-5 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ He ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">0.83</span>
                        <span class="text-xl param-unit">[Oe]</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 ">
                <div class="glass-card p-8 animate-fade-in stagger-6 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ Hex ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">5124</span>
                        <span class="text-xl param-unit">[Oe]</span>
                    </div>
                </div>

                <div class="glass-card p-8 animate-fade-in stagger-6 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ Uniformity ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">1.47</span>
                        <span class="text-xl param-unit">%</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 ">
                <div class="glass-card p-8 animate-fade-in stagger-6 hover:bg-white/5 transition-colors">
                    <div class="param-label mb-2">[ 温度系数 ]</div>
                    <div class="flex items-baseline justify-center gap-2 py-8">
                        <span class="text-5xl md:text-6xl param-value">0.07</span>
                        <span class="text-xl param-unit">%/K</span>
                    </div>
                </div>

                <div class="glass-card p-8 animate-fade-in stagger-6 hover:bg-white/5 transition-colors">
                </div>
            </div>

            <div class="glass-card p-10 animate-fade-in stagger-7 hover:bg-white/5 transition-colors">
                <div class="param-label mb-2">[ 生产规格 ]</div>
                <div class="flex items-baseline justify-center gap-2 py-4">
                    <span class="text-5xl md:text-6xl param-value">8</span>
                    <span class="text-2xl text-gray-400 mx-2">吋 、</span>
                    <span class="text-5xl md:text-6xl param-value">12</span>
                    <span class="text-2xl text-gray-400 mx-2">吋</span>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initGlobalNav } from './nav.js';
        
        // 自动将 Header 注入页面顶部
        initGlobalNav();

        // 原本视差晃动的效果保留
        document.addEventListener('mousemove', (e) => {
            const wafer = document.querySelector('.wafer-image');
            const glow = document.querySelector('.wafer-glow');

            // 修正：由于改为 fixed 且定位在了左侧，晃动幅度微微减小以免出戏
            const x = (window.innerWidth - e.pageX) / 80;
            const y = (window.innerHeight - e.pageY) / 80;

            wafer.style.transform = `translateX(calc(-50% + ${x}px)) translateY(${y}px) rotate(-15deg)`;
            glow.style.transform = `translateX(calc(-50% + ${x * 0.5}px)) translateY(${y * 0.5}px)`;
        });

        // 滚动卡片逐渐清晰的 Intersection Observer
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.glass-card').forEach((el) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out, background-color 0.3s';
            observer.observe(el);
        });
    </script>
</body>
</html>
